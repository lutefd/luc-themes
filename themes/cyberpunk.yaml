# Cyberpunk — neon-on-near-black dark theme.
# Electric yellow primary with cyan counter-accent; saturated magenta/pink
# error + diff tones so everything reads as "neon sign on matte panel".
inherits: dark
colors:
  bg: "#090B10"
  panel: "#11151C"
  panel_alt: "#161C26"
  line: "#2B3442"
  accent: "#FCEE0A"
  accent_alt: "#00F0FF"
  text: "#F5F7FA"
  muted: "#B7C0CC"
  subtle: "#7E8A99"
  success: "#3DFFB5"
  warn: "#FFB020"
  blue: "#4DA3FF"
  cyan: "#00F0FF"
  error_text: "#FF5C8A"
  diff_add_bg: "#123229"
  diff_add_fg: "#8DFFCF"
  diff_del_bg: "#3A1622"
  diff_del_fg: "#FF9FBE"
